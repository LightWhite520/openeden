ktor:
  deployment:
    port: "$OPENEDEN_SERVER_PORT:8080"
  application:
    modules:
      - io.openeden.server.SerializationKt.configureSerialization
      - io.openeden.server.WebsocketsKt.configureWebsockets
      - io.openeden.server.StatusPagesKt.configureStatusPages
      - io.openeden.server.RuntimeKt.configureRuntime
      - io.openeden.server.RoutingKt.configureRouting

openeden:
  llm:
    apiKey: "$OPENEDEN_OPENAI_API_KEY:replace-with-your-api-key"
    model: "$OPENEDEN_OPENAI_MODEL:gpt-5.5"
    baseUrl: "$OPENEDEN_OPENAI_BASE_URL:https://api.openai.com/v1"
    reasoningEffort: "$OPENEDEN_LLM_REASONING_EFFORT:medium"
  runtime:
    personaPath: "$OPENEDEN_PERSONA_PATH:persona/default.yaml"
    databasePath: "$OPENEDEN_RUNTIME_DB_PATH:data/runtime/openeden.db"
    localModelArtifact: "$OPENEDEN_LOCAL_MODEL_ARTIFACT:data/models/local-model-artifact.json"
    modelBackend: "$OPENEDEN_MODEL_BACKEND:djl"
    djlVqVaeModelPath: "$OPENEDEN_DJL_VQVAE_MODEL_PATH:data/models/djl/vqvae"
    djlTextModelPath: "$OPENEDEN_DJL_TEXT_MODEL_PATH:data/models/djl/text"
    djlEmotionalModelPath: "$OPENEDEN_DJL_EMOTIONAL_MODEL_PATH:data/models/djl/emotional"
    djlAffectModelPath: "$OPENEDEN_DJL_AFFECT_MODEL_PATH:data/models/user-affect-qwen"
    djlEngine: "$OPENEDEN_DJL_ENGINE:PyTorch"
    djlModelName: "$OPENEDEN_DJL_MODEL_NAME:model"
  heartbeat:
    ownerPlatform: "$?OPENEDEN_OWNER_PLATFORM:"
    ownerUserId: "$?OPENEDEN_OWNER_USER_ID:"
  diary:
    deltaThreshold: "$OPENEDEN_DIARY_DELTA_THRESHOLD:0.25"
    elapsedHours: "$OPENEDEN_DIARY_ELAPSED_HOURS:5"
    scanIntervalSeconds: "$OPENEDEN_DIARY_SCAN_INTERVAL_SECONDS:60"
    maxRawMemories: "$OPENEDEN_DIARY_MAX_RAW_MEMORIES:32"
